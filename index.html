const nfFull = new Intl.NumberFormat('ru-RU');
const nfMoney = new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 });

const fmtCompact = (n) => {
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n / 1e9).toFixed(1).replace('.', ',') + ' млрд';
  if (abs >= 1e6) return (n / 1e6).toFixed(abs >= 1e7 ? 0 : 1).replace('.', ',') + ' M';
  if (abs >= 1e4) return Math.round(n / 1e3) + ' k';
  if (abs >= 1e3) return (n / 1e3).toFixed(1).replace('.', ',') + ' k';
  return Math.round(n).toString();
};

const fmtPct = (v) => {
  if (!isFinite(v) || v === 0) return '0%';
  if (v < 0.001) return '<0,1%';
  if (v < 0.01)  return (v * 100).toFixed(2).replace('.', ',') + '%';
  if (v < 1)     return (v * 100).toFixed(1).replace('.', ',') + '%';
  return Math.round(v * 100) + '%';
};

const fmtMoney = (n) => nfMoney.format(Math.round(n));

function useMatrix({ projectIdx, selectedSources, yearFilter, maxPeriods }) {
  return useMemo(() => {
    // matrix[cohort][offset] = [v, p, r]
    const m = new Map();
    const sourceSet = new Set(selectedSources);

    for (let i = 0; i < RECORDS.length; i++) {

      if (off >= maxPeriods) continue;

      let row = m.get(cohort);
      if (!row) { row = new Map(); m.set(cohort, row); }
      let cell = row.get(off);
      if (!cell) { cell = [0, 0, 0]; row.set(off, cell); }
      cell[0] += r[4];
      cell[1] += r[5];
      cell[2] += r[6];
    }

      const row = m.get(cohort);
      const cells = new Array(maxPeriods).fill(null);

        cells[off] = vals;
        totals[0] += vals[0];
        totals[1] += vals[1];
        totals[2] += vals[2];

      return { cohort, cells, totals };
    });

    let grandTotals = [0, 0, 0];
    for (const { cells, totals } of dense) {
      for (let i = 0; i < maxPeriods; i++) {
        if (cells[i]) {
          aggregate[i][0] += cells[i][0];
          aggregate[i][1] += cells[i][1];
          aggregate[i][2] += cells[i][2];
        }
      }
      grandTotals[0] += totals[0];
      grandTotals[1] += totals[1];
      grandTotals[2] += totals[2];
    }

    return { rows: dense, aggregate, grandTotals };
  }, [projectIdx, selectedSources, yearFilter, maxPeriods]);
}

// =====================================================================
// Heat color
// =====================================================================
function heatStyle(intensity) {
  // intensity: 0..1
  if (!isFinite(intensity) || intensity <= 0) return { backgroundColor: 'transparent' };
  const a = Math.min(0.55, 0.04 + intensity * 0.55);
  return { backgroundColor: `rgba(245, 158, 11, ${a.toFixed(3)})` };
}

// =====================================================================
// CohortTable
// =====================================================================
function CohortTable({ title, matrix, metric, metricSlot, pctMode, maxPeriods }) {
  const periods = Array.from({ length: maxPeriods }, (_, i) => i);

  // For each row compute base for % calc
  function rowBase(row) {
    if (pctMode === 'row') {
      let s = 0;
      for (const c of row.cells) if (c) s += c[metricSlot];
      return s;
    }
    return row.cells[0] ? row.cells[0][metricSlot] : 0;
  }

  // For heat normalization, compute max % across all visible cells
  let maxIntensity = 0;
  for (const row of matrix.rows) {
    const base = rowBase(row);
    if (base <= 0) continue;
    for (const c of row.cells) {
      if (!c) continue;
      const v = c[metricSlot] / base;
      if (v > maxIntensity) maxIntensity = v;
    }
  }
  if (maxIntensity === 0) maxIntensity = 1;

  // Aggregate row at bottom
  const aggBase = pctMode === 'row'
    ? matrix.aggregate.reduce((s, c) => s + (c ? c[metricSlot] : 0), 0)
    : (matrix.aggregate[0] ? matrix.aggregate[0][metricSlot] : 0);

  return (
    <div className="rounded-lg border border-zinc-800 overflow-hidden" style={{ background: '#0f0f11' }}>
      <div className="px-4 py-3 border-b border-zinc-800 flex items-center justify-between">
        <h3 className="text-sm font-semibold text-zinc-200 flex items-center gap-2">
          <span className="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
          {title}
          <span className="text-xs text-zinc-500 font-normal ml-2 num">· {matrix.rows.length} когорт</span>
        </h3>
        <div className="text-xs text-zinc-500">
          Метрика: <span className="text-amber-400 font-semibold">{METRICS.find(m => m.key === metric).label}</span>
        </div>
      </div>

      <div className="overflow-auto scrollbar-thin" style={{ maxHeight: '70vh' }}>
        <table className="w-full text-xs num border-separate" style={{ borderSpacing: 0 }}>
          <thead className="sticky top-0 z-20" style={{ background: '#16161a' }}>
            <tr>
              <th className="sticky left-0 z-30 text-left px-3 py-2 font-semibold text-zinc-400 border-b border-r border-zinc-800" style={{ minWidth: 110, background: '#16161a' }}>Когорта</th>
              <th className="sticky z-30 text-right px-3 py-2 font-semibold text-zinc-400 border-b border-r border-zinc-800" style={{ left: 110, minWidth: 90, background: '#16161a' }}>Итого</th>
              {periods.map(i => (
                <th key={i} className="text-center px-2 py-2 font-semibold text-zinc-500 border-b border-zinc-800" style={{ minWidth: 78 }}>
                  M{i}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {matrix.rows.map((row, rowIdx) => {
              const base = rowBase(row);
              const rowTotal = row.totals[metricSlot];
              return (
                <tr key={row.cohort} className="hover:bg-zinc-900/40 group">
                  <td className="sticky left-0 z-10 px-3 py-1.5 text-zinc-300 font-medium border-b border-r border-zinc-800/60 group-hover:bg-zinc-900/80" style={{ background: '#0f0f11' }}>
                    {row.cohort}
                  </td>
                  <td className="sticky z-10 text-right px-3 py-1.5 text-zinc-400 border-b border-r border-zinc-800/60 group-hover:bg-zinc-900/80" style={{ left: 110, background: '#0f0f11' }}>
                    {metric === 'revenue' ? fmtCompact(rowTotal) : nfFull.format(rowTotal)}
                  </td>
                  {row.cells.map((cell, off) => {
                    if (!cell) {
                      return <td key={off} className="border-b border-zinc-900 text-zinc-700 text-center" style={{ padding: '6px 4px' }}>·</td>;
                    }
                    const val = cell[metricSlot];
                    const pct = base > 0 ? val / base : 0;
                    return (
                      <td key={off}
                          className="border-b border-zinc-900 text-center align-middle"
                          style={{ ...heatStyle(pct / maxIntensity), padding: '4px 6px' }}
                          title={`${row.cohort} · M${off}\n${metric === 'revenue' ? fmtMoney(val) : nfFull.format(val)} (${fmtPct(pct)})`}
                      >
                        <div className="text-zinc-100 font-medium leading-tight">
                          {fmtCompact(val)}
                        </div>
                        <div className="text-amber-300/80 leading-tight" style={{ fontSize: 10 }}>
                          {fmtPct(pct)}
                        </div>
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
          <tfoot className="sticky bottom-0 z-20" style={{ background: '#16161a' }}>
            <tr>
              <td className="sticky left-0 z-30 px-3 py-2 text-amber-400 font-semibold border-t border-r border-zinc-800" style={{ background: '#16161a' }}>Всего</td>
              <td className="sticky z-30 text-right px-3 py-2 text-amber-400 font-semibold border-t border-r border-zinc-800" style={{ left: 110, background: '#16161a' }}>
                {metric === 'revenue' ? fmtCompact(matrix.grandTotals[metricSlot]) : nfFull.format(matrix.grandTotals[metricSlot])}
              </td>
              {periods.map(i => {
                const cell = matrix.aggregate[i];
                if (!cell || cell[metricSlot] === 0) return <td key={i} className="border-t border-zinc-800 text-zinc-700 text-center py-2">·</td>;
                const val = cell[metricSlot];
                const pct = aggBase > 0 ? val / aggBase : 0;
                return (
                  <td key={i} className="border-t border-zinc-800 text-center py-1.5" style={{ background: 'rgba(245,158,11,0.06)' }}>
                    <div className="text-amber-200 font-semibold leading-tight">{fmtCompact(val)}</div>
                    <div className="text-amber-400/70 leading-tight" style={{ fontSize: 10 }}>{fmtPct(pct)}</div>
                  </td>
                );
              })}
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

// =====================================================================
// Helper: aggregate matrix (used for split-by-project mode)
// =====================================================================
function aggregateMatrix({ projectIdx, selectedSources, yearFilter, maxPeriods }) {
  const m = new Map();
  const sourceSet = new Set(selectedSources);

  for (let i = 0; i < RECORDS.length; i++) {
    const r = RECORDS[i];
    const pi = r[0], si = r[1], ci = r[2], off = r[3];
    if (projectIdx !== null && projectIdx !== pi) continue;
    if (!sourceSet.has(si)) continue;
    if (off >= maxPeriods) continue;
    const cohort = COHORTS[ci];
    if (yearFilter !== 'all' && !cohort.startsWith(yearFilter)) continue;

    let row = m.get(cohort);
    if (!row) { row = new Map(); m.set(cohort, row); }
    let cell = row.get(off);
    if (!cell) { cell = [0, 0, 0]; row.set(off, cell); }
    cell[0] += r[4];
    cell[1] += r[5];
    cell[2] += r[6];
  }

  const cohortsSorted = Array.from(m.keys()).sort();
  const dense = cohortsSorted.map(cohort => {
    const row = m.get(cohort);
    const cells = new Array(maxPeriods).fill(null);
    let totals = [0, 0, 0];
    for (const [off, vals] of row) {
      cells[off] = vals;
      totals[0] += vals[0];
      totals[1] += vals[1];
      totals[2] += vals[2];
    }
    return { cohort, cells, totals };
  });

  const aggregate = new Array(maxPeriods).fill(null).map(() => [0, 0, 0]);
  let grandTotals = [0, 0, 0];
  for (const { cells, totals } of dense) {
    for (let i = 0; i < maxPeriods; i++) {
      if (cells[i]) {
        aggregate[i][0] += cells[i][0];
        aggregate[i][1] += cells[i][1];
        aggregate[i][2] += cells[i][2];
      }
    }
    grandTotals[0] += totals[0];
    grandTotals[1] += totals[1];
    grandTotals[2] += totals[2];
  }

  return { rows: dense, aggregate, grandTotals };
}

    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CohortDashboard />);

    document.getElementById('boot')?.remove();
  </script>
</body>
